<style>


.vacancies-hero {
    background: rgba(30,30,50,0.85);
    text-align: center;
    padding: 2rem 1rem;
    margin-bottom: 0.5rem;
}

.vacancies-hero h1 {
    margin: 0;
    font-size: 2rem;
    color: #00ff00;
}

/* ================= CONTACT SECTION ================= */
.contact-section {
  max-width: 1100px;
  margin: 40px auto;
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
}

/* ================= CARD ================= */
.contact-card {
  background: white;
  padding: 30px 20px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  text-align: center;
  transition: 0.3s ease;

  display: flex;
  flex-direction: column;
  height: 85%;
}

.contact-card:hover {
  transform: translateY(-5px);
}

.contact-card i {
  font-size: 40px;
  color: #0a58ca;
  margin-bottom: 15px;
}

.contact-card h3 {
  margin-bottom: 10px;
}

.contact-card p {
  font-size: 14px;
  color: #555;
  margin-bottom: 20px;
}

/* ================= BUTTON ================= */
.contact-btn {
  margin-top: auto;
  display: inline-block;
  padding: 12px 18px;
  background: #0a58ca;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.contact-btn:hover {
  background: #084298;
}

/* WhatsApp Special */
.whatsapp-btn {
  background: #25D366;
}

.whatsapp-btn:hover {
  background: #1ebc57;
}

/* ================= MAP EMBED ================= */
.map-container iframe {
  width: 100%;
  height: 200px;
  border-radius: 10px;
  border: 0;
  margin-bottom: 15px;
}

/* ================= MOBILE 768px ================= */
@media (max-width: 768px) {

  .contact-section {
    grid-template-columns: 1fr;
    padding: 10px;
  }

  header h1 {
    font-size: 1.8rem;
  }

  .contact-card {
    padding: 25px 15px;
  }

  .contact-card i {
    font-size: 32px;
  }

  .contact-btn {
    width: 100%;
    padding: 14px;
  }

}

/* Page Loader Overlay */
#page-loader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  opacity: 1;
  transition: opacity 0.4s ease;
}

/* Hide loader */
#page-loader.hidden {
  opacity: 0;
  pointer-events: none;
}

/* Spinner Animation */
.spinner {
  width: 50px;
  height: 50px;
  border: 5px solid #e0e0e0;
  border-top: 5px solid #0a58ca;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

/* Header */
.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.page-header h2 {
    margin: 0;
    font-size: 1.4rem;
}

.create-btn {
    background: #1a73e8;
    color: #fff;
    padding: 10px 16px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
}

/* Table Card */
.card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    padding: 20px;
}

/* Controls */
.table-controls {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.table-controls select,
.table-controls input {
    padding: 6px 10px;
    border: 1px solid #ddd;
    border-radius: 5px;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: #1a73e8;
    color: #fff;
}

th, td {
    padding: 12px;
    text-align: left;
    font-size: 0.95rem;
}

tbody tr {
    border-bottom: 1px solid #eee;
}

tbody tr:hover {
    background: #f1f5ff;
}

/* Actions */
.action-btn {
    padding: 6px 10px;
    font-size: 0.85rem;
    border-radius: 5px;
    text-decoration: none;
    margin-right: 4px;
}

.edit {
    background: #6c757d;
    color: #fff;
}

.delete {
    background: #dc3545;
    color: #fff;
}

.download {
    color: #1a73e8;
    font-weight: 600;
    text-decoration: none;
}

/* Pagination */
.pagination {
    margin-top: 15px;
    text-align: right;
}

.pagination a {
    display: inline-block;
    padding: 6px 10px;
    margin-left: 4px;
    background: #e9ecef;
    border-radius: 4px;
    text-decoration: none;
    color: #333;
}

.pagination a.active {
    background: #1a73e8;
    color: #fff;
}

</style>

<!--Canvas Animation-->

  <script>
    const canvas = document.getElementById('networkCanvas');
    const ctx = canvas.getContext('2d');

    // Full-page sizing
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    const nodesCount = 100;
    const maxDistance = 150;

    const nodes = [];

    // Initialize nodes
    for (let i = 0; i < nodesCount; i++) {
      nodes.push({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: (Math.random() - 0.5) * 1.2,
        vy: (Math.random() - 0.5) * 1.2,
        radius: Math.random() * 3 + 1.5
      });
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);

      // Draw nodes
      nodes.forEach(node => {
        node.x += node.vx;
        node.y += node.vy;

        // Bounce from edges
        if (node.x < 0 || node.x > width) node.vx *= -1;
        if (node.y < 0 || node.y > height) node.vy *= -1;

        ctx.beginPath();
        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#00ffff';
        ctx.fill();
      });

      // Draw lines between nearby nodes
      for (let i = 0; i < nodesCount; i++) {
        for (let j = i + 1; j < nodesCount; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < maxDistance) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(0, 255, 255, ${1 - distance / maxDistance})`;
            ctx.lineWidth = 1;
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(animate);
    }

    animate();

    // Update canvas on resize
    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });
  </script>

<script>
  // Hamburger toggle
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('navLinks');

  hamburger.addEventListener('click', () => {
    navLinks.classList.toggle('active');
  });

  // Fade-in on scroll
  const items = document.querySelectorAll('.about-content ul li');

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        entry.target.classList.add('fade-in');
      }
    });
  }, {
    threshold: 0.1
  });

  items.forEach(item => {
    observer.observe(item);
  });
</script>

<!--Page Loader-->
<script>
  // Hide loader after page fully loads
  window.addEventListener("load", () => {
    document.getElementById("page-loader").classList.add("hidden");
  });

  // Show loader when navigating to another page
  document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", event => {
      const href = link.getAttribute("href");

      // Ignore empty links, anchors, and external targets
      if (!href || href.startsWith("#") || link.target === "_blank") return;

      event.preventDefault();
      document.getElementById("page-loader").classList.remove("hidden");

      setTimeout(() => {
        window.location.href = href;
      }, 300);
    });
  });
</script>

</script>
